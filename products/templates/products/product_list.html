{% for product in products %}
    <div class="product-card">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
        <div class="product-name">{{ product.name }}</div>
        <div class="product-price">₹{{ product.price }}</div>
        <a href="/product/{{ product.id }}/" class="view-btn">View Details</a>
    </div>
{% empty %}
    <p>No products found.</p>
{% endfor %}
<style>
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

/* ===== CARD (ONLY ALIGNMENT FIX) ===== */
.product-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    transition: all 0.3s ease;

    /* FIX ONLY (NO VISUAL CHANGE) */
    display: flex;
    flex-direction: column;
}

/* hover same rakha */
.product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* IMAGE SAME */
.product-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 15px;
}

/* NAME SAME */
.product-name {
    font-size: 18px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
}

/* PRICE SAME */
.product-price {
    font-size: 16px;
    font-weight: 700;
    color: #DB2777;
    margin-bottom: 15px;
}

/* BUTTON FIX ONLY */
.view-btn {
    display: inline-block;
    padding: 8px 18px;
    background: #DB2777;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;

    /* IMPORTANT FIX */
    margin-top: auto;
}

.view-btn:hover {
    background: #ff1a8c;
    transform: scale(1.05);
}
</style>
