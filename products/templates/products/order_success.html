{% extends "base.html" %}
{% block content %}

<style>

/* Fade animation for card */
.success-card {
    animation: fadeInUp 0.8s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Confetti pieces */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall linear infinite;
    z-index: 9999;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}

</style>

<div class="max-w-3xl mx-auto bg-white p-8 mt-10 rounded-2xl shadow success-card relative">

    <h2 class="text-3xl font-bold text-green-600 mb-4">
        🎉 Order Placed Successfully!
    </h2>

    <p class="text-gray-600 mb-6">
        Order ID: <strong>#{{ order.id }}</strong>
    </p>

    <h3 class="text-xl font-semibold mb-4">Order Details:</h3>

    {% for item in order.items.all %}
        <div class="flex justify-between border-b py-2">
            <span>{{ item.product.name }} x {{ item.quantity }}</span>
            <span>₹{{ item.price }}</span>
        </div>
    {% endfor %}

    <div class="flex justify-between font-bold text-lg mt-4">
        <span>Total</span>
        <span>₹{{ order.total_amount }}</span>
    </div>

    <div style="text-align:right; margin-top:20px;">
        <a href="{% url 'home' %}" 
           class="inline-block mt-6 bg-pink-600 text-white px-6 py-2 rounded-lg hover:bg-pink-700 transition">
            Continue Shopping
        </a>
    </div>

</div>

<script>

/* 🎊 Confetti Effect */
function createConfetti() {
    const colors = ['#ff4d6d', '#ff99c8', '#c77dff', '#70e000', '#ffd60a'];

    for (let i = 0; i < 80; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
        confetti.style.opacity = Math.random();
        document.body.appendChild(confetti);

        setTimeout(() => {
            confetti.remove();
        }, 5000);
    }
}

/* Run effect when page loads */
window.onload = function() {
    createConfetti();
};

</script>

{% endblock %}
