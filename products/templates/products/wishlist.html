{% extends "base.html" %}
{% block content %}
<div class="mb-6">
    <a href="{% url 'home' %}"
       class="inline-flex items-center gap-2 bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg transition">
        ← Back to Home
    </a>
</div>
<h1 style="text-align:center; margin-top:20px;">❤️ Your Wishlist</h1>

{% if wishlist_items %}
<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; max-width:1200px; margin:auto; margin-top:20px;">
    {% for item in wishlist_items %}
    <div style="border:1px solid #ddd; border-radius:10px; text-align:center; padding:10px;">
        <img src="{{ item.product.image.url|default:'https://via.placeholder.com/250' }}" alt="{{ item.product.name }}" style="width:100%; height:200px; object-fit:cover;">
        <h3>{{ item.product.name }}</h3>
        <p style="color:#e91e63; font-weight:bold;">₹{{ item.product.price }}</p>
        <input type="number" value="1" min="1" id="qty_{{ item.product.id }}" style="width:60px;">
        <div style="margin-top:10px; display:flex; gap:5px; justify-content:center;">
            <button onclick="addToCart('{{ item.product.id }}')" style="padding:5px 10px; background:#e91e63; color:white; border:none; border-radius:5px; cursor:pointer;">🛒 Add to Cart</button>
            <a href="{% url 'remove_from_wishlist' item.id %}" style="padding:5px 10px; background:#ccc; border-radius:5px; text-decoration:none;">❌ Remove</a>
        </div>
    </div>
    {% endfor %}
</div>

{% else %}
<p style="text-align:center; margin-top:50px;">Your wishlist is empty.</p>
{% endif %}

<script>
function addToCart(productId){
    const qty = document.getElementById('qty_' + productId).value;
    // Redirect to add_to_cart view with quantity as GET param
    window.location.href = `/add_to_cart/${productId}/?quantity=${qty}`;
}
</script>

{% endblock %}
