{% extends "base.html" %}
{% load static %}
{% block content %}

<style>

/* ===== Page Title ===== */
.page-title {
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 30px;
    color: #333;
}

/* ===== Filter Container ===== */
.filter-bar {
    background: #ffffff;
    padding: 20px 30px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

/* ===== Label Styling ===== */
.filter-label {
    font-weight: 600;
    margin-right: 10px;
    color: #333;
    font-size: 15px;
}

/* ===== Dropdown Styling ===== */
.filter-select {
    padding: 10px 18px;
    border: 2px solid #ddd;   /* Normal grey */
    border-radius: 12px;
    background-color: #fafafa;
    font-weight: 600;
    font-size: 14px;
    outline: none;
    cursor: pointer;
    min-width: 160px;
    transition: border-color 0.3s ease;
}

/* ===== Hover Border Pink ===== */
.filter-select:hover {
    border-color: #ff4da6;
}

/* ===== After Click (Focus) Border Pink ===== */
.filter-select:focus {
    border-color: #ff4da6;
}

/* ===== Products Grid ===== */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

/* ===== Product Card ===== */
.product-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    transition: all 0.3s ease;
}

.product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* ===== Product Image ===== */
.product-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 15px;
}

/* ===== Product Name ===== */
.product-name {
    font-size: 18px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
}

/* ===== Product Price ===== */
.product-price {
    font-size: 16px;
    font-weight: 700;
    color: #DB2777;
    margin-bottom: 15px;
}

/* ===== View Button ===== */
.view-btn {
    display: inline-block;
    padding: 8px 18px;
    background: #DB2777;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
}

.view-btn:hover {
    background: #ff1a8c;
    transform: scale(1.05);
}

</style>


<div id="productContainer" class="product-grid">
    {% for product in products %}
        <div class="product-card">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
            <div class="product-name">{{ product.name }}</div>
            <div class="product-price">₹{{ product.price }}</div>
            <a href="{% url 'product_detail' product.id %}" class="view-btn">
                View Details
            </a>
        </div>
    {% empty %}
        <p>No products found.</p>
    {% endfor %}
</div> <!-- productContainer end -->

<script src="{% static 'js/ajax.js' %}"></script>
</body>
{% endblock %}
